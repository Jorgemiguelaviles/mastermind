<div class="min-h-screen flex items-center justify-center px-4 py-6 font-mono">

  <div class="w-full max-w-lg
              rounded-2xl border-2
              backdrop-blur-xl shadow-2xl
              flex flex-col p-8 gap-8 animate-fade-in"
       [ngClass]="venceu ? 'border-green-500 shadow-green-900/20' : 'border-red-500 shadow-red-900/20'">

    <div class="text-center space-y-2">
      <p class="text-secondary tracking-[0.3em] text-sm uppercase">Status da Missão</p>
      <h1 class="text-5xl tracking-tighter font-black italic"
          [ngClass]="venceu ? 'text-green-400' : 'text-red-400'">
        {{ venceu ? 'VITÓRIA' : 'DERROTA' }}
      </h1>
      
      <p class="text-xs font-bold tracking-[0.5em] uppercase opacity-70"
         [ngClass]="venceu ? 'text-green-200' : 'text-red-200'">
        Nível: {{ dificuldade }}
      </p>
    </div>

    <hr class="opacity-10" [ngClass]="venceu ? 'border-green-500' : 'border-red-500'">

    <div class="flex flex-col gap-6">
      
      <div class="text-center group">
        <p class="text-xs text-secondary mb-1 tracking-widest uppercase">Pontos Obtidos</p>
        <p class="text-7xl font-bold text-white drop-shadow-[0_0_20px_rgba(255,255,255,0.4)]">
          {{ pontuacao }}
        </p>
      </div>

      <div class="flex items-center justify-center gap-3 p-4 rounded-xl bg-black/40 border border-white/10 shadow-inner">
        <div class="flex flex-col items-center">
            <span class="text-[10px] text-secondary uppercase tracking-[0.2em]">Tempo de Operação</span>
            <span class="text-2xl text-white font-mono font-bold">{{ tempo }}s</span>
        </div>
      </div>

    </div>

    <div class="flex justify-center mt-4">
      <button
        (click)="voltarInicio()"
        class="group relative px-10 py-4 rounded-full border bg-transparent
               text-white font-bold tracking-[0.2em] overflow-hidden
               transition-all duration-300
               hover:text-black"
        [ngClass]="venceu ? 'border-green-500 hover:bg-green-500' : 'border-red-500 hover:bg-red-500'">
        
        <span class="relative z-10">REINICIAR JOGO</span>
        
        <div class="absolute inset-0 opacity-0 group-hover:opacity-100 blur-md transition-opacity"
             [ngClass]="venceu ? 'bg-green-400' : 'bg-red-400'"></div>
      </button>
    </div>

  </div>

</div>
