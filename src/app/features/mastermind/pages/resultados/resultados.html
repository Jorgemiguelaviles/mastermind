<div class="min-h-screen flex items-center justify-center px-4 py-6">

  <!-- CONTAINER -->
  <div class="w-full max-w-3xl
              rounded-2xl border border-primary
              backdrop-blur-md shadow-neon
              flex flex-col p-6 gap-6 animate-fade-in">

    <!-- RESULTADO -->
    <div class="text-center">

      <h1
        class="text-4xl tracking-widest font-bold"
        [ngClass]="venceu ? 'text-green-400' : 'text-red-400'">

        {{ venceu ? 'VOCÊ VENCEU' : 'VOCÊ PERDEU' }}

      </h1>

    </div>

    <!-- INFO PRINCIPAL -->
    <div class="flex flex-col gap-4 text-center">

      <p [ngClass]="venceu ? 'text-green-300' : 'text-red-300'">
        Dificuldade: {{ dificuldade }}
      </p>

      <p [ngClass]="venceu ? 'text-green-300' : 'text-red-300'">
        Tempo: {{ tempo }}
      </p>

    </div>

    <!-- DASHBOARD SIMPLES -->
    <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mt-4">

      <div class="p-4 rounded-xl border border-primary text-center backdrop-blur-md">
        <p class="text-xs text-secondary">Média de Tempo</p>
        <p class="text-lg text-white">{{ stats.mediaTempo }}</p>
      </div>

      <div class="p-4 rounded-xl border border-primary text-center backdrop-blur-md">
        <p class="text-xs text-secondary">Melhor Tempo</p>
        <p class="text-lg text-white">{{ stats.melhorTempo }}</p>
      </div>

      <div class="p-4 rounded-xl border border-primary text-center backdrop-blur-md">
        <p class="text-xs text-secondary">Win Rate</p>
        <p class="text-lg text-white">{{ stats.winRate }}%</p>
      </div>

    </div>

    <!-- BOTÃO -->
    <div class="flex justify-center mt-6">

      <button
        (click)="voltarInicio()"
        class="px-8 py-3 rounded-xl border border-primary
               text-secondary tracking-widest
               transition transform
               hover:scale-105
               hover:bg-primary/20
               hover:shadow-[0_0_25px_#00ffff]">

        VOLTAR AO INÍCIO

      </button>

    </div>

  </div>

</div>
